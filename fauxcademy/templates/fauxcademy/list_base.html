{% extends "fauxcademy/base.html" %}
{% load static %}

{% block sidebar %}
<script type="module" src="{% static 'fauxcademy/js/components/sidebar.js' %}"></script>

<div
    id="award-data"
    data-award-owner="{{ award.owner.username }}"
    data-award-slug="{{ award.slug }}"
    data-award-name="{{ award.name }}">
</div>

<button class="sidebar-toggle" id="sidebar-toggle" type="button">
    <i data-lucide="menu"></i>
</button>

<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-title">
        {{ award.name }}
    </div>

    <nav class="sidebar-nav">
        <a href="{% url 'categories' username=award.owner.username listname=award.slug %}" class="{% if active_page == 'categories' %}active{% endif %}">Cast Your Vote</a>
        {% if category %}
        <a href="{% url 'category_detail' username=award.owner.username listname=award.slug slug=category.slug %}" class="active category-link">{{ category.name }}</a>
        {% endif %}
        <a href="{% url 'user_list' username=award.owner.username listname=award.slug %}" class="{% if active_page == 'user_list' %}active{% endif %}">Films</a>
        <a href="{% url 'members' username=award.owner.username listname=award.slug %}" class="{% if active_page == 'members' %}active{% endif %}">Members</a>
        {% if user.is_authenticated %}
        <a href="{% url 'profile' user.username %}">Return to Profile</a>
        {% endif %}
    </nav>
</aside>
{% endblock %}
